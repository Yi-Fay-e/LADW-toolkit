<!DOCTYPE html>
<html lang="zh-TW" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>深空獵人錢包深度紀錄</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        :root {
            --bg-deep: #0f1014; --card-bg: #1c1e26;
            --accent-purple: #5e5ce6; --accent-gold: #fcc21b;
            --text-main: #e4e6eb; --text-dim: #9ba1ad;
        }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; }
        .glass-card { background: var(--card-bg); border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4); }
        .tab-btn { padding: 12px 24px; border-radius: 12px; font-size: 14px; color: var(--text-dim); transition: all 0.3s; background: rgba(255, 255, 255, 0.03); }
        .tab-active { color: white; background: var(--accent-purple); box-shadow: 0 0 15px rgba(94, 92, 230, 0.4); }
        input, select { background-color: #2c2e3a !important; color: white !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; border-radius: 12px !important; padding: 10px 14px !important; width: 100%; }
        .confirm-btn { background: linear-gradient(90deg, #6366f1 0%, #a855f7 100%); color: white; padding: 16px; border-radius: 16px; width: 100%; font-weight: bold; cursor: pointer; transition: opacity 0.2s; }
        .confirm-btn:active { opacity: 0.8; }
        .category-header { background: #252833; padding: 16px; border-radius: 16px; margin-bottom: 8px; cursor: pointer; display: flex; justify-content: space-between; }
        .stat-card { background: var(--card-bg); padding: 20px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.05); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-indigo-600 rounded-2xl flex items-center justify-center shadow-lg">
                    <i data-lucide="wallet" class="text-white"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold text-yellow-400"><span id="displayName">獵人</span>的錢包深度紀錄</h1>
                    <p class="text-[10px] text-dim tracking-widest uppercase">Deepspace Finance Log V37</p>
                </div>
            </div>
            <div class="flex gap-2">
                <button onclick="changeName()" class="text-xs bg-white/5 px-4 py-2 rounded-xl border border-white/10">修改名稱</button>
                <button onclick="exportJSON()" class="text-xs bg-white/5 px-4 py-2 rounded-xl border border-white/10">匯出備份</button>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-10">
            <div class="stat-card">
                <span class="text-xs text-dim">總計消費金額</span>
                <div class="text-3xl font-bold text-white mt-1">NT$ <span id="totalCost">0</span></div>
            </div>
            <div class="stat-card">
                <span class="text-xs text-dim">累計消耗紅鑽</span>
                <div class="text-3xl font-bold text-purple-400 mt-1"><span id="totalDiamonds">0</span></div>
            </div>
        </div>

        <div class="flex p-1 bg-[#1c1e26] rounded-2xl mb-8 w-fit border border-white/5 gap-1">
            <button onclick="switchTab('activity')" id="tab-activity" class="tab-btn tab-active">活動花費</button>
            <button onclick="switchTab('topup')" id="tab-topup" class="tab-btn">儲值/密約</button>
        </header>

        <main id="content-activity" class="space-y-6">
            <div class="glass-card p-8">
                <h3 class="text-lg font-bold mb-6 flex items-center gap-2"><i data-lucide="sparkles" class="text-indigo-400"></i> 登錄新活動</h3>
                <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                    <div>
                        <label class="text-xs text-dim block mb-2">活動名稱</label>
                        <input type="text" id="actName" placeholder="例如：人間縫綣意">
                    </div>
                    <div>
                        <label class="text-xs text-dim block mb-2">日期</label>
                        <input type="date" id="actDate">
                    </div>
                    <div>
                        <label class="text-xs text-dim block mb-2">消耗紅鑽</label>
                        <input type="number" id="actDia" placeholder="0">
                    </div>
                    <div>
                        <label class="text-xs text-dim block mb-2">額外課金 (NT$)</label>
                        <input type="number" id="actCash" placeholder="0">
                    </div>
                </div>
                <button onclick="addRecord()" class="confirm-btn mt-8">確認登錄活動</button>
            </div>
        </main>

        <main id="content-topup" class="hidden space-y-6">
            <div class="glass-card p-8">
                <h3 class="text-lg font-bold mb-6 text-yellow-400">常駐與訂閱項目</h3>
                <div class="grid grid-cols-1 gap-3">
                    <button onclick="quickAdd('月卡 (鎏金卡)', 150)" class="category-header"><span>月卡 (鎏金卡)</span><span>NT$ 150</span></button>
                    <button onclick="quickAdd('特別密約', 320)" class="category-header"><span>特別密約</span><span>NT$ 320</span></button>
                    <button onclick="quickAdd('週卡 (特權)', 220)" class="category-header"><span>週卡 (特權)</span><span>NT$ 220</span></button>
                </div>
            </div>
        </main>

        <section class="mt-10">
            <h3 class="font-bold mb-4 flex items-center gap-2"><i data-lucide="clock-3"></i> 歷史紀錄</h3>
            <div id="logList" class="space-y-3"></div>
        </section>
    </div>

    <script>
        lucide.createIcons();
        let records = JSON.parse(localStorage.getItem('fay_data') || '[]');
        let hunterName = localStorage.getItem('fay_name') || '苡菲';

        function init() {
            document.getElementById('displayName').innerText = hunterName;
            updateUI();
        }

        function switchTab(tab) {
            document.getElementById('content-activity').classList.toggle('hidden', tab !== 'activity');
            document.getElementById('content-topup').classList.toggle('hidden', tab !== 'topup');
            document.getElementById('tab-activity').classList.toggle('tab-active', tab === 'activity');
            document.getElementById('tab-topup').classList.toggle('tab-active', tab === 'topup');
        }

        function addRecord() {
            const name = document.getElementById('actName').value;
            const cost = parseInt(document.getElementById('actCash').value) || 0;
            const dia = parseInt(document.getElementById('actDia').value) || 0;
            const date = document.getElementById('actDate').value || new Date().toLocaleDateString();
            
            if(!name) return alert('請輸入活動名稱');
            
            records.unshift({ name, cost, dia, date });
            save();
        }

        function quickAdd(name, cost) {
            records.unshift({ name, cost, dia: 0, date: new Date().toLocaleDateString() });
            save();
            alert(`已加入 ${name}`);
        }

        function save() {
            localStorage.setItem('fay_data', JSON.stringify(records));
            updateUI();
        }

        function updateUI() {
            const list = document.getElementById('logList');
            let totalC = 0, totalD = 0;
            
            list.innerHTML = records.map((r, index) => {
                totalC += r.cost;
                totalD += r.dia;
                return `
                    <div class="glass-card p-4 flex justify-between items-center border-l-4 border-indigo-500">
                        <div>
                            <div class="font-bold">${r.name}</div>
                            <div class="text-[10px] text-dim">${r.date} · 💎 ${r.dia}</div>
                        </div>
                        <div class="text-right">
                            <div class="text-yellow-400 font-bold">NT$ ${r.cost}</div>
                            <button onclick="deleteRec(${index})" class="text-[10px] text-red-400 opacity-50">刪除</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            document.getElementById('totalCost').innerText = totalC.toLocaleString();
            document.getElementById('totalDiamonds').innerText = totalD.toLocaleString();
        }

        function deleteRec(i) {
            if(confirm('確定刪除這筆紀錄？')) {
                records.splice(i, 1);
                save();
            }
        }

        function changeName() {
            const n = prompt('請輸入妳的名字：', hunterName);
            if(n) {
                hunterName = n;
                localStorage.setItem('fay_name', n);
                document.getElementById('displayName').innerText = n;
            }
        }

        function exportJSON() {
            const blob = new Blob([JSON.stringify(records)], {type: 'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `深空紀錄_${hunterName}.json`;
            a.click();
        }

        init();
    </script>
</body>
</html>
