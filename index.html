<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>活動財務日誌 V37 - 本地版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        :root {
            --bg-deep: #0f1014;
            --card-bg: #1c1e26;
            --accent-purple: #5e5ce6;
            --text-main: #e4e6eb;
        }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Noto Sans TC', sans-serif; }
        .glass-card { background: var(--card-bg); border-radius: 24px; border: 1px solid rgba(255,255,255,0.05); }
        #loading-overlay { position: fixed; inset: 0; background: var(--bg-deep); z-index: 9999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid rgba(255,255,255,0.1); border-left-color: var(--accent-purple); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body class="p-4 md:p-8">
    <div id="loading-overlay">
        <div class="spinner"></div>
        <p class="mt-4 text-xs tracking-widest uppercase">系統啟動中...</p>
    </div>

    <div class="max-w-4xl mx-auto">
        <header class="mb-8">
            <h1 class="text-2xl font-bold text-yellow-400">深空獵人錢包紀錄</h1>
            <p class="text-xs text-gray-400">苡菲專屬工具 (數據儲存於此瀏覽器)</p>
        </header>

        <div class="glass-card p-8 mb-6">
            <label class="block mb-2 text-sm">活動名稱</label>
            <input type="text" id="actName" class="w-full bg-gray-800 p-3 rounded-xl mb-4" placeholder="輸入活動名稱...">
            <label class="block mb-2 text-sm">花費金額 (NT$)</label>
            <input type="number" id="actPrice" class="w-full bg-gray-800 p-3 rounded-xl mb-6" placeholder="0">
            <button onclick="saveData()" class="w-full bg-indigo-600 py-4 rounded-xl font-bold">確認紀錄</button>
        </div>

        <div class="glass-card p-8">
            <h3 class="font-bold mb-4">歷史紀錄</h3>
            <div id="historyList" class="space-y-2"></div>
        </div>
    </div>

    <script>
        // 模擬載入動畫
        window.addEventListener('load', () => {
            setTimeout(() => {
                document.getElementById('loading-overlay').style.display = 'none';
                renderHistory();
            }, 800);
        });

        function saveData() {
            const name = document.getElementById('actName').value;
            const price = document.getElementById('actPrice').value;
            if(!name || !price) return alert('請輸入完整資訊');

            const records = JSON.parse(localStorage.getItem('deepspace_records') || '[]');
            records.unshift({ name, price, date: new Date().toLocaleDateString() });
            localStorage.setItem('deepspace_records', JSON.stringify(records));
            
            document.getElementById('actName').value = '';
            document.getElementById('actPrice').value = '';
            renderHistory();
        }

        function renderHistory() {
            const records = JSON.parse(localStorage.getItem('deepspace_records') || '[]');
            const list = document.getElementById('historyList');
            list.innerHTML = records.map(r => `
                <div class="flex justify-between bg-white/5 p-3 rounded-lg text-sm">
                    <span>${r.name}</span>
                    <span class="text-yellow-400">NT$ ${r.price}</span>
                </div>
            `).join('');
        }
    </script>
</body>
</html>
