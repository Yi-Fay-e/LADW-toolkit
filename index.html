<!DOCTYPE html>
<html lang="zh-TW" translate="no">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="google" content="notranslate">
    <title>活動財務日誌 V37</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        :root {
            --bg-deep: #0f1014; --card-bg: #1c1e26; --accent-purple: #5e5ce6;
            --accent-gold: #fcc21b; --text-main: #e4e6eb; --text-dim: #9ba1ad;
        }
        body { background-color: var(--bg-deep); color: var(--text-main); font-family: 'Noto Sans TC', sans-serif; min-height: 100vh; letter-spacing: 0.5px; }
        .glass-card { background: var(--card-bg); border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.05); box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4); }
        .tab-btn { padding: 12px 14px; border-radius: 12px; font-size: 14px; font-weight: 500; color: var(--text-dim); transition: all 0.3s; background: rgba(255, 255, 255, 0.03); border: 1px solid transparent; white-space: nowrap; }
        @media (min-width: 640px) { .tab-btn { padding: 12px 24px; } }
        .tab-active { color: white; background: var(--accent-purple); box-shadow: 0 0 15px rgba(94, 92, 230, 0.4); }
        input, select { background-color: #2c2e3a !important; color: white !important; border: 1px solid rgba(255, 255, 255, 0.1) !important; border-radius: 12px !important; padding: 10px 14px !important; transition: border 0.3s; }
        input:focus { border-color: var(--accent-purple) !important; outline: none; }
        .confirm-btn { background: linear-gradient(90deg, #6366f1 0%, #a855f7 100%); color: white; font-size: 16px; padding: 16px; border-radius: 16px; width: 100%; font-weight: bold; display: flex; justify-content: center; align-items: center; gap: 10px; transition: transform 0.2s, opacity 0.2s; cursor: pointer; }
        .counter-btn { background: #2c2e3a; color: white; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 8px; border: 1px solid rgba(255, 255, 255, 0.1); cursor: pointer; user-select: none; font-size: 14px; }
        .check-item { cursor: pointer; transition: all 0.2s; border-radius: 16px; background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(255, 255, 255, 0.03); }
        .check-item.active { background: rgba(94, 92, 230, 0.15); border-color: var(--accent-purple); }
        .category-header { background: #252833; padding: 16px; border-radius: 16px; cursor: pointer; display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
        .category-content { padding: 0 4px; max-height: 0; overflow: hidden; transition: max-height 0.3s ease-out; }
        .category-content.open { max-height: 1200px; }
        #editModal, #nameModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; padding: 20px; }
        .backup-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); padding: 8px 16px; border-radius: 12px; font-size: 12px; font-weight: bold; display: flex; align-items: center; gap: 6px; cursor: pointer; }
        .pagination-ctrl { display: flex; align-items: center; justify-content: center; gap: 15px; margin-top: 20px; padding-top: 10px; }
        .page-btn { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); color: white; padding: 8px 16px; border-radius: 10px; font-size: 12px; font-weight: bold; cursor: pointer; }
        .editable-name { cursor: pointer; border-bottom: 2px dashed rgba(255,255,255,0.2); }
    </style>
</head>
<body class="p-4 md:p-8">
    <div class="max-w-6xl mx-auto">
        <header class="mb-12 flex flex-col md:flex-row md:items-end justify-between gap-6">
            <div class="flex items-center gap-4">
                <div class="relative w-12 h-12 bg-white/5 rounded-2xl flex items-center justify-center border border-white/5">
                    <i data-lucide="coins" class="w-6 h-6 text-yellow-400 absolute translate-x-[-4px] translate-y-[-4px]"></i>
                    <i data-lucide="gem" class="w-5 h-5 text-purple-400 absolute translate-x-[6px] translate-y-[6px]"></i>
                </div>
                <div>
                    <h1 class="text-2xl font-bold tracking-tight text-yellow-400">
                        <span id="displayHunterName" class="editable-name" onclick="openNameModal()">點擊輸入</span>獵人錢包深度紀錄
                    </h1>
                    <p class="text-xs font-bold text-[#9ba1ad] uppercase tracking-widest mt-0.5 italic">錢包破洞探測</p>
                </div>
            </div>
            <div class="flex items-center gap-3">
                <button onclick="exportData()" class="backup-btn"><i data-lucide="download" class="w-4 h-4"></i> 匯出備份</button>
                <button onclick="document.getElementById('importInput').click()" class="backup-btn"><i data-lucide="upload" class="w-4 h-4"></i> 匯入還原</button>
                <input type="file" id="importInput" class="hidden" accept=".json" onchange="importData(event)">
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-12">
            <div class="glass-card p-8 flex flex-col justify-center">
                <span class="text-[11px] text-[#9ba1ad] uppercase tracking-widest font-bold mb-4">總計消費金額</span>
                <div class="flex items-baseline gap-2">
                    <span class="text-xs text-[#9ba1ad]">NT$</span>
                    <span id="totalP" class="text-4xl font-bold text-white">0</span>
                </div>
            </div>
            <div class="glass-card p-8 flex flex-col justify-center">
                <span class="text-[11px] text-[#9ba1ad] uppercase tracking-widest font-bold mb-2">最近一筆活動</span>
                <div id="recentActivity" class="text-lg font-bold text-white">-</div>
            </div>
        </div>

        <div class="flex p-1 bg-[#1c1e26] rounded-2xl mb-10 w-fit border border-white/5 gap-1">
            <button onclick="switchTab('activity')" id="nav-activity" class="tab-btn tab-active">活動花費</button>
            <button onclick="switchTab('topup')" id="nav-topup" class="tab-btn">儲值/密約</button>
            <button onclick="switchTab('analysis')" id="nav-analysis" class="tab-btn">破洞分析</button>
        </div>

        <div id="section-activity" class="space-y-8">
            <div class="grid grid-cols-1 lg:grid-cols-2 gap-8">
                <div class="glass-card p-8">
                    <h3 class="text-lg font-bold mb-8 flex items-center gap-3"><i data-lucide="plus-circle" class="w-5 h-5 text-indigo-400"></i>登錄活動花費</h3>
                    <div class="space-y-6">
                        <input type="text" id="actName" placeholder="活動名稱" class="w-full">
                        <input type="date" id="actDate" class="w-full">
                        <div class="flex gap-4">
                            <input type="number" id="actBefore" placeholder="前鑽量" class="w-full">
                            <input type="number" id="actAfter" placeholder="後鑽量" class="w-full">
                        </div>
                        <input type="number" id="actCash" placeholder="課金金額 NT$" class="w-full">
                        <button onclick="saveActivity()" class="confirm-btn">確認活動花費</button>
                    </div>
                </div>
                <div class="glass-card p-8">
                    <h3 class="text-lg font-bold mb-6 flex items-center gap-3"><i data-lucide="history" class="w-5 h-5 text-purple-400"></i>活動歷程</h3>
                    <div id="activityList" class="space-y-4"></div>
                </div>
            </div>
        </div>

        <div id="section-topup" class="hidden">
            <div class="glass-card p-8">
                <h3 class="text-lg font-bold mb-6 text-yellow-400">快速儲值</h3>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <button onclick="quickAdd('月卡', 150)" class="check-item p-4 text-left">月卡 NT$ 150</button>
                    <button onclick="quickAdd('特別密約', 320)" class="check-item p-4 text-left">特別密約 NT$ 320</button>
                    <button onclick="quickAdd('週卡', 220)" class="check-item p-4 text-left">週卡 NT$ 220</button>
                </div>
                <div id="paymentList" class="mt-8 space-y-3"></div>
            </div>
        </div>

        <div id="section-analysis" class="hidden">
            <div class="glass-card p-8 min-h-[400px] flex items-center justify-center text-dim italic">
                分析功能載入中...
            </div>
        </div>
    </div>

    <div id="nameModal">
        <div class="glass-card p-8 w-full max-w-sm">
            <h3 class="text-xl font-bold mb-6">更改獵人名稱</h3>
            <input type="text" id="inputHunterName" class="w-full mb-6">
            <div class="flex gap-4">
                <button onclick="closeNameModal()" class="w-full py-3 bg-white/5 rounded-xl">取消</button>
                <button onclick="saveHunterName()" class="w-full py-3 bg-indigo-500 rounded-xl font-bold">儲存</button>
            </div>
        </div>
    </div>

    <script>
        // 1. 初始化資料，增加防錯確保讀取成功
        let activities = [];
        let payments = [];
        let hName = '苡菲';

        try {
            activities = JSON.parse(localStorage.getItem('fae_activities')) || [];
            payments = JSON.parse(localStorage.getItem('fae_payments')) || [];
            hName = localStorage.getItem('fae_name') || '苡菲';
        } catch (e) {
            console.error("讀取儲存空間失敗", e);
        }

        function init() {
            lucide.createIcons();
            document.getElementById('displayHunterName').innerText = hName;
            // 設定今天日期為預設值，防止沒填日期
            document.getElementById('actDate').valueAsDate = new Date();
            renderUI();
        }

        // 2. 核心存檔：明確的寫入邏輯
        function persistentSave() {
            try {
                localStorage.setItem('fae_activities', JSON.stringify(activities));
                localStorage.setItem('fae_payments', JSON.stringify(payments));
                localStorage.setItem('fae_name', hName);
                console.log("資料已即時備份到本地");
            } catch (e) {
                alert("儲存空間已滿或被禁用，請檢查瀏覽器設定。");
            }
        }

        // 3. 視窗監聽：防止切換 App 或關閉分頁導致資料遺失
        window.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'hidden') {
                persistentSave();
            }
        });

        function renderUI() {
            const total = activities.reduce((s, a) => s + (parseInt(a.cash)||0), 0) + 
                          payments.reduce((s, p) => s + (parseInt(p.cash)||0), 0);
            document.getElementById('totalP').innerText = total.toLocaleString();
            
            if(activities.length > 0) {
                document.getElementById('recentActivity').innerText = activities[0].name;
            } else {
                document.getElementById('recentActivity').innerText = "-";
            }

            document.getElementById('activityList').innerHTML = activities.map((a, i) => `
                <div class="p-4 bg-white/5 rounded-2xl flex justify-between border border-white/5">
                    <div><div class="font-bold">${a.name}</div><div class="text-[10px] text-dim">${a.date}</div></div>
                    <div class="text-right">
                        <div class="text-yellow-400 font-bold">NT$ ${a.cash}</div>
                        <button onclick="deleteAct(${i})" class="text-[10px] text-red-400 mt-1">刪除</button>
                    </div>
                </div>
            `).join('');

            document.getElementById('paymentList').innerHTML = payments.map((p, i) => `
                <div class="p-4 bg-white/5 rounded-xl flex justify-between text-sm">
                    <span>${p.name} (${p.date})</span>
                    <div class="flex gap-4">
                        <span class="text-yellow-400 font-bold">NT$ ${p.cash}</span>
                        <button onclick="deletePay(${i})" class="text-red-400">✕</button>
                    </div>
                </div>
            `).join('');
        }

        function saveActivity() {
            const name = document.getElementById('actName').value;
            const cash = document.getElementById('actCash').value || 0;
            const date = document.getElementById('actDate').value || new Date().toLocaleDateString();
            if(!name) return alert('請輸入活動名稱');
            
            activities.unshift({ name, cash: parseInt(cash), date });
            persistentSave();
            renderUI();
            document.getElementById('actName').value = '';
        }

        function quickAdd(name, cash) {
            payments.unshift({ name, cash, date: new Date().toLocaleDateString() });
            persistentSave();
            renderUI();
        }

        function deleteAct(i) { activities.splice(i, 1); persistentSave(); renderUI(); }
        function deletePay(i) { payments.splice(i, 1); persistentSave(); renderUI(); }

        function switchTab(t) {
            ['activity', 'topup', 'analysis'].forEach(id => {
                const section = document.getElementById('section-'+id);
                const nav = document.getElementById('nav-'+id);
                if(section) section.classList.toggle('hidden', id !== t);
                if(nav) nav.classList.toggle('tab-active', id === t);
            });
        }

        window.openNameModal = () => {
            document.getElementById('inputHunterName').value = hName;
            document.getElementById('nameModal').style.display = 'flex';
        };
        window.closeNameModal = () => document.getElementById('nameModal').style.display = 'none';
        window.saveHunterName = () => {
            hName = document.getElementById('inputHunterName').value || '苡菲';
            persistentSave();
            document.getElementById('displayHunterName').innerText = hName;
            closeNameModal();
        };

        window.exportData = () => {
            const blob = new Blob([JSON.stringify({activities, payments, hName})], {type:'application/json'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url; a.download = `獵人錢包_${hName}.json`; a.click();
        };

        window.importData = (e) => {
            const reader = new FileReader();
            reader.onload = (f) => {
                const data = JSON.parse(f.target.result);
                activities = data.activities || [];
                payments = data.payments || [];
                hName = data.hName || '苡菲';
                persistentSave();
                init();
            };
            reader.readAsText(e.target.files[0]);
        };

        init();
    </script>
</body>
</html>
